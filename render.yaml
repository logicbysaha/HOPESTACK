services:
  - type: web
    name: hopestack
    env: node
    plan: free # Change to starter/standard if needed
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Render will ask to provide this during first deploy
      - key: JWT_SECRET
        sync: false # Render will ask to provide this during first deploy
      - key: PORT
        value: 10000
